spring:
  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-that-should-be-changed-in-production-at-least-64-bytes-long-for-hs512}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 604800000
